{% load static %}

<header class="fixed inset-x-0 top-0 z-50 border-b border-base-300/70 bg-base-100/85 backdrop-blur-xs">
    <div class="navbar mx-auto w-full max-w-7xl px-4 py-2 sm:px-6 lg:px-8">
        <div class="navbar-start">
            <a href="{% url 'home' %}"
               class="flex items-center gap-3 rounded-box px-2 py-1 pl-0 transition hover:bg-base-200/70">
                <div class="flex h-11 w-11 items-center justify-center rounded-box bg-primary/10 p-2">
                    <img src="{% static 'img/logo_gestao_pec.png' %}"
                         alt="Logo Gestão PEC"
                         class="h-8 w-8 rounded" />
                </div>

                <div>
                    <p class="text-xs font-semibold uppercase tracking-[0.25em] text-primary whitespace-nowrap">
                        sitema
                    </p>
                    <p class="text-lg font-black tracking-tight whitespace-nowrap">Gestão PEC</p>
                </div>
            </a>
        </div>

        <div class="navbar-center hidden lg:flex">
            <ul class="menu menu-horizontal gap-2 rounded-full border border-base-300/70 bg-base-200/60 p-2">
                <li>
                    <a href="{% url 'home' %}" class="rounded-full px-4 font-medium transition-colors 
                        {% if active_page == 'agenda' %}bg-primary text-primary-content{% endif %}">Agenda</a>
                    </li>
                    <li>
                        <a href="{% url 'divisao_grupos' %}" class="rounded-full px-4 font-medium transition-colors 
                            {% if active_page == 'grupos' %}bg-primary text-primary-content{% endif %}">Grupos</a>
                        </li>
                    </ul>
                </div>

                <div class="navbar-end gap-2">
                    <div class="lg:hidden flex gap-1">
                        <a href="{% url 'home' %}" class="btn btn-ghost btn-sm 
                            {% if active_page == 'agenda' %}btn-active{% endif %}">Agenda</a>
                            <a href="{% url 'divisao_grupos' %}" class="btn btn-ghost btn-sm 
                                {% if active_page == 'grupos' %}btn-active{% endif %}">Grupos</a>
                            </div>
                            <a href="{% url 'dashboard' %}" class="btn btn-primary btn-sm sm:btn-md">Gestão</a>
                        </div>
                    </div>
                </header>
